<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Russian Vocab Drill</title>
</head>
<body>

<div class="memrise-container">
  <div class="stats-panel">
    <div class="progress-bar">
      <div id="progress"></div>
    </div>
    <div class="score">Pts: <span id="points">0</span></div>
  </div>

  <div class="flashcard">
    <div class="header">TRANSLATE THIS PHRASE</div>
    
    <div class="phrase-container">
      <div id="word-to-test" class="phrase-display">...</div>
      <button id="audio-btn" class="icon-btn">
        <span class="icon">🔊</span>
      </button>
    </div>
    
    <div id="options-container" class="options-grid"></div>
  </div>

  <div id="feedback" class="feedback-msg"></div>
</div>

</body>
</html>
